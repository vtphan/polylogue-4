    argument_flaw:
      pattern: big_claim_little_evidence
      detection_act: not_enough_support
      explanation: "The AI thinks Mia might be saying a lot more than her sources can back up. She says 'the documentary and the article both prove that when people learn about this stuff, they change what they do' and then says 'it's not even a question anymore.' But she only has one documentary and one article. That's a really big claim from not a lot of evidence."
    thinking_behavior:
      pattern: confirmation_bias
      explanation: "The AI thinks Mia might have only paid attention to things that agreed with what she already believed. She found one article and one documentary that supported her idea, and she stopped looking for anything else. Maybe she was so excited about the campaign that she only noticed the stuff that said it would work."

  - annotation_id: ann_02
