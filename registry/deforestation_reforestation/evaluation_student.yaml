  argument_flaw:
    pattern: missing_downsides
    detection_act: somethings_missing
    explanation: The AI thinks Sofia might only be showing one side of the story here. She talks about all the great things
      reforestation programs did — communities coming together, animals coming back, cool before-and-after photos — but she
      never mentions any downsides. She doesn't talk about how long the trees take to grow, what happens if cutting continues,
      or whether planting can actually keep up with deforestation. Marcus keeps asking about these things, but Sofia keeps
      steering back to the positives.
  thinking_behavior:
    pattern: tunnel_vision
    explanation: The AI thinks Sofia might be so focused on how exciting and inspiring reforestation is that she's missing
      the bigger picture. She found all these amazing success stories and got so locked in on the positive side that she can't
      see the parts that don't fit her vision — like the 20-year timeline or the fact that cutting is still happening.
