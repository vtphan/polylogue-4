scenario_id: "deforestation_reforestation"
personas:
- persona_id: "sofia"
  name: "Sofia"
  role: "Researcher focused on reforestation solutions"
- persona_id: "marcus"
  name: "Marcus"
  role: "Researcher focused on causes of deforestation"
turns:
- turn_id: "turn_01"
  speaker: sofia
  sentences:
  - id: "turn_01.s01"
    text: "Okay so I found this really cool thing — there's a program in Ethiopia where they planted 350 million trees in\
      \ one single day."
  - id: "turn_01.s02"
    text: "And it actually worked! The area started getting greener and people got really into it."
  - id: "turn_01.s03"
    text: "I think we should make our presentation about reforestation because it's so inspiring and people can actually do\
      \ something about it."
- turn_id: "turn_02"
  speaker: marcus
  sentences:
  - id: "turn_02.s01"
    text: "Yeah that's cool, but I was looking into why deforestation happens in the first place, and it's really big."
  - id: "turn_02.s02"
    text: "Every year they cut down millions of acres of forest for farming and building and logging."
  - id: "turn_02.s03"
    text: "I think our presentation should talk about that, because if we don't stop the cutting, planting new trees doesn't\
      \ really fix anything."
- turn_id: "turn_03"
  speaker: sofia
  sentences:
  - id: "turn_03.s01"
    text: "I mean yeah, deforestation is bad, obviously, but don't you think it's kind of depressing to just talk about the\
      \ problem?"
  - id: "turn_03.s02"
    text: "If we do reforestation, we're showing people something they can actually go out and do."
  - id: "turn_03.s03"
    text: "People want to hear about solutions, not just bad news."
- turn_id: "turn_04"
  speaker: marcus
  sentences:
  - id: "turn_04.s01"
    text: "But that's like — okay, imagine you're filling up a bathtub but the drain is open."
  - id: "turn_04.s02"
    text: "You can keep pouring water in, but if the drain is open it's never gonna fill up."
  - id: "turn_04.s03"
    text: "That's what planting trees is like if we don't stop the cutting."
  - id: "turn_04.s04"
    text: "Shouldn't we at least mention that there are downsides to only focusing on reforestation?"
- turn_id: "turn_05"
  speaker: sofia
  sentences:
  - id: "turn_05.s01"
    text: "Okay but listen to what these programs actually did."
  - id: "turn_05.s02"
    text: "The one in Ethiopia got whole communities involved — thousands of people came out and planted trees together and\
      \ it created jobs and everything."
  - id: "turn_05.s03"
    text: "And there's one in India where they planted 50 million trees and it brought back animals that had left the area."
  - id: "turn_05.s04"
    text: "See, it works! The presentation could show all of that, and the escape room could have people figure out how to\
      \ plan their own tree-planting project."
- turn_id: "turn_06"
  speaker: marcus
  sentences:
  - id: "turn_06.s01"
    text: "Wait, but the Ethiopia one — I read about that too."
  - id: "turn_06.s02"
    text: "It took like 20 years for those trees to actually grow big enough to make a real difference."
  - id: "turn_06.s03"
    text: "So what's happening during those 20 years while they're still cutting down the old forests?"
- turn_id: "turn_07"
  speaker: sofia
  sentences:
  - id: "turn_07.s01"
    text: "I mean, 20 years sounds like a lot, but at least they're doing something, right?"
  - id: "turn_07.s02"
    text: "The point is you have to start somewhere."
  - id: "turn_07.s03"
    text: "And the presentation will be way more exciting if we focus on the action part — all the good stuff these programs\
      \ did — instead of all the stuff that's going wrong."
- turn_id: "turn_08"
  speaker: sofia
  sentences:
  - id: "turn_08.s01"
    text: "Oh and I was thinking — for the presentation we could show before and after pictures of places where they planted\
      \ trees."
  - id: "turn_08.s02"
    text: "Like how it was all dry and empty and then after the planting it's green and there are birds and stuff."
  - id: "turn_08.s03"
    text: "That's the kind of thing that makes people want to go out and do something!"
- turn_id: "turn_09"
  speaker: marcus
  sentences:
  - id: "turn_09.s01"
    text: "Sofia, I get that it looks cool, but if we only show the good parts and skip all the problems, that's not really\
      \ honest."
  - id: "turn_09.s02"
    text: "Our audience is gonna think tree planting just fixes everything, and it doesn't."
  - id: "turn_09.s03"
    text: "They deserve to know the full picture."
- turn_id: "turn_10"
  speaker: sofia
  sentences:
  - id: "turn_10.s01"
    text: "I hear you, I do, but I really think the positive message is what's gonna work best."
  - id: "turn_10.s02"
    text: "We could mention deforestation at the beginning, like for context, and then spend most of the time on reforestation\
      \ and what people can do."
  - id: "turn_10.s03"
    text: "That way we're covering both but the focus stays on solutions."
- turn_id: "turn_11"
  speaker: marcus
  sentences:
  - id: "turn_11.s01"
    text: "I guess... yeah, okay."
  - id: "turn_11.s02"
    text: "I still think the downsides matter, but if you think this way works better then let's just do it your way."
  - id: "turn_11.s03"
    text: "I don't want to hold us up — we still have to build the escape room too."
- turn_id: "turn_12"
  speaker: sofia
  sentences:
  - id: "turn_12.s01"
    text: "Yes! Okay so the plan is we open with a quick bit about deforestation, and then the rest is all about reforestation\
      \ — the success stories, the community stuff, the before and after photos."
  - id: "turn_12.s02"
    text: "This is gonna be so good, I'm actually really excited."
- turn_id: "turn_13"
  speaker: marcus
  sentences:
  - id: "turn_13.s01"
    text: "Yeah, sounds good."
  - id: "turn_13.s02"
    text: "I still kinda think we should say something about how planting can't keep up with the cutting — actually, never\
      \ mind, it's fine."
  - id: "turn_13.s03"
    text: "Let's go with your plan."
