scenario_id: deforestation_reforestation

annotations:
  - annotation_id: ann_01
    location:
      turn: turn_05
      sentences: [turn_05.s01, turn_05.s02, turn_05.s03, turn_05.s04]
    argument_flaw:
      pattern: missing_downsides
      detection_act: somethings_missing
      explanation: "The AI thinks Sofia might be only telling the good side of the story here. She talks about how many trees were planted, how communities got involved, and how it created jobs — but she doesn't mention any problems or limitations at all. She even says 'I don't see any downsides,' which is a big hint that she's not looking at the full picture."
    thinking_behavior:
      pattern: tunnel_vision
      explanation: "The AI thinks Sofia might be so focused on the exciting parts of tree planting that she's missing the bigger picture. She found this amazing program and got really into all the good parts — but she's not thinking about what could go wrong, how long it takes, or whether planting alone actually solves the problem."
      plausible_alternatives:
        - confirmation_bias
        - emotional_reasoning
    planned: true

  - annotation_id: ann_02
    location:
      turn: turn_07
      sentences: [turn_07.s01, turn_07.s02, turn_07.s03]
    argument_flaw:
      pattern: missing_downsides
      detection_act: somethings_missing
      explanation: "The AI thinks Sofia is doing it again here. Marcus just asked a really specific question — what happens during the 20 years while people keep cutting old forests? Instead of answering that, Sofia just says 'at least they're doing something' and goes back to talking about how great the presentation will be. She still hasn't mentioned a single downside."
    thinking_behavior:
      pattern: tunnel_vision
      explanation: "The AI thinks Sofia is still locked in on her one idea. Marcus gave her a real fact — it took 20 years — and instead of thinking about what that means, she brushed it off and went right back to talking about the positives. It's like she can only see the part she's excited about."
      plausible_alternatives:
        - confirmation_bias
        - emotional_reasoning
    planned: true

  - annotation_id: ann_03
    location:
      turn: turn_08
      sentences: [turn_08.s01, turn_08.s02, turn_08.s03, turn_08.s04]
    argument_flaw:
      pattern: missing_downsides
      detection_act: somethings_missing
      explanation: "The AI thinks Sofia keeps piling on more positives without ever stopping to address Marcus's concerns. She's now planning before-and-after photos and a call to action — all great stuff — but she still hasn't talked about any risks, limitations, or what happens if deforestation keeps going. It's all good stuff and zero bad stuff."
    thinking_behavior:
      pattern: tunnel_vision
      explanation: "The AI thinks Sofia has completely tunneled into presentation planning mode. She's so excited about the visuals and the call to action that she's moved past Marcus's questions as if they were never asked. She's only seeing the part of the story she wants to tell."
      plausible_alternatives:
        - confirmation_bias
        - emotional_reasoning
    planned: true

  - annotation_id: ann_04
    location:
      turn: turn_11
      sentences: [turn_11.s01, turn_11.s02, turn_11.s03]
    argument_flaw:
      pattern: abandoned_concern
      detection_act: not_really_resolved
      explanation: "The AI thinks Marcus might be giving up his point here, not because Sofia proved him wrong, but because he doesn't want to slow things down. He says 'I guess you have a point' and 'I don't want to hold us up' — but his original concern about downsides was never actually answered. Sofia never explained why it's okay to leave out the downsides. Marcus just stopped asking."
    thinking_behavior:
      pattern: groupthink
      explanation: "The AI thinks Marcus might be going along with Sofia instead of thinking for himself. He had a really good point — that their presentation should be honest about the downsides — but he gave in because he didn't want to be the one still disagreeing. He cared more about keeping things moving than about getting it right."
      plausible_alternatives:
        - emotional_reasoning
        - overreliance_on_authority
    planned: true

  - annotation_id: ann_05
    location:
      turn: turn_13
      sentences: [turn_13.s01, turn_13.s02, turn_13.s03]
    argument_flaw:
      pattern: abandoned_concern
      detection_act: not_really_resolved
      explanation: "The AI thinks this is the clearest sign that Marcus gave up his point without being convinced. He starts to bring it up again — 'I still think we should maybe' — and then stops himself mid-sentence and says 'never mind, it's fine.' That's not someone who changed their mind. That's someone who decided it wasn't worth fighting about anymore."
    thinking_behavior:
      pattern: groupthink
      explanation: "The AI thinks Marcus is choosing peace over honesty here. He literally starts to say his concern out loud, catches himself, and gives up. He's going along with Sofia's plan even though he still disagrees, because disagreeing again feels too uncomfortable."
      plausible_alternatives:
        - emotional_reasoning
        - overreliance_on_authority
    planned: true

summary:
  total_annotations: 5
  target_flaws_surfaced: 2
  target_flaws_planned: 2

quality_assessment:
  all_targets_surfaced: true
  issues: []

facilitation_guide:
  timing:
    phase_1_minutes: 12
    phase_2_minutes: 10
    phase_3_minutes: 13
    phase_4_minutes: 15

  what_to_expect:
    - flaw: missing_downsides
      turns: "turns 5-8 (Sofia)"
      signal: "Sofia lists benefit after benefit — jobs, volunteers, wildlife — and says 'I don't see any downsides.' She never once mentions a limitation even after Marcus asks about the 20-year timeline."
      difficulty: most_will_catch
    - flaw: abandoned_concern
      turns: "turns 11 and 13 (Marcus)"
      signal: "Marcus says 'I don't want to hold us up' in turn 11, then in turn 13 starts to raise his point again — 'I still think we should maybe' — and stops himself: 'actually, never mind, it's fine.'"
      difficulty: harder_to_spot

  phase_1:
    - prompt: "Re-read turns 5 through 8. Does Sofia ever mention anything that could go wrong with tree planting, or is it all good news?"
      targets: missing_downsides
    - prompt: "Follow Marcus through the whole discussion. Does he change his mind, or does he just stop talking about it? Look at turns 11 and 13 closely."
      targets: abandoned_concern
    - prompt: "Look at turn 13. Read Marcus's second sentence out loud. What do you notice about how he stops mid-sentence?"
      targets: abandoned_concern

  phase_2:
    - flaw: missing_downsides
      narrowed_options:
        - tunnel_vision
        - confirmation_bias
        - emotional_reasoning
      perspective_prompt: "Imagine you're Sofia. You found this incredible story about 350 million trees being planted in one day, and you're so excited to share it. Why might you skip over the parts that aren't as exciting?"
    - flaw: abandoned_concern
      narrowed_options:
        - groupthink
        - emotional_reasoning
        - overreliance_on_authority
      perspective_prompt: "Imagine you're Marcus. You think the presentation should include the downsides, but Sofia is really confident and excited, and you still have to build the escape room. Why might you just say 'fine' even though you still disagree?"

  phase_4:
    - type: student_victory
      prompt: "Some of you noticed that Sofia only talks about the good parts of reforestation and never mentions the downsides. That's exactly what the AI flagged too. Nice work — what made that stand out to you?"
    - type: challenge
      prompt: "The AI says Marcus 'went along with the group instead of thinking for himself.' But some of you might say Marcus was just being practical — they had work to do and couldn't argue forever. Both sides, make your case: was Marcus being a pushover, or was he being realistic?"
    - type: missed_flaw
      prompt: "If nobody caught the abandoned_concern — go back and read turn 13 out loud. Marcus says 'I still think we should maybe — actually, never mind, it's fine.' What does that tell you about whether he really changed his mind?"
    - type: challenge
      prompt: "Here's a tough one: Sofia offered a compromise — one slide on deforestation at the beginning. Is that a real compromise that addresses Marcus's concern, or did it just sound good enough to end the argument?"
