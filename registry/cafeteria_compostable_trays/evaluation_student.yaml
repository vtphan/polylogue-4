  argument_flaw:
    pattern: big_claim_little_evidence
    detection_act: not_enough_support
    explanation: The AI thinks Maya might be making a really big claim based on not very much. She says 'the research proves
      that compostable trays are the best option for any school' — but she only read one article from one website. That's
      a huge conclusion to draw from a single source.
  thinking_behavior:
    pattern: confirmation_bias
    explanation: The AI thinks Maya might have already decided that compostable trays were the answer before she even finished
      researching. She found one article that agreed with her, and she treated it like it covered everything she needed to
      know — maybe because it told her what she already wanted to hear.
- annotation_id: ann_02
