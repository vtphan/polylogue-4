    - turn_05.s03
  argument_flaw:
    pattern: one_example_as_proof
    detection_act: not_enough_support
    explanation: The AI thinks Maya might be treating one school's success as proof that it will work everywhere. She talks
      about a school in Oregon that cut waste by 40 percent and then says 'if it worked there, it'll work at our school too.'
      But one school's result doesn't automatically mean every school will get the same result.
  thinking_behavior:
    pattern: echo_chamber
    explanation: The AI thinks Maya might have only been looking at sources that said good things about compostable trays.
      She says 'everything I found said compostable trays are great' — which might mean she was searching in a way that only
      showed her positive results, instead of looking for a mix of opinions.
