# Schema: Discussion Transcript (post-enumeration)
# Produced by: enumerate_turns.py (after instructional designer polish)
# Consumed by: evaluate_script, Perspectives app
# Design doc: lines 401-415

schema:
  name: discussion_transcript
  description: The final enumerated discussion transcript with turn and sentence IDs.

fields:
  scenario_id:
    type: string
    required: true
    description: "Matches the scenario plan's scenario_id."

  personas:
    type: list
    required: true
    description: "Persona display information for the app. Only includes fields safe for students to see."
    items:
      type: object
      fields:
        persona_id:
          type: string
          required: true
          description: "Matches persona_id from the scenario plan."

        name:
          type: string
          required: true
          description: "Display name (e.g., 'Mia')."

        role:
          type: string
          required: true
          description: "The persona's role in the group."
        # NOT included: perspective, strengths, weaknesses — these reveal flaw design

  turns:
    type: list
    required: true
    description: "The discussion turns in order."
    constraints:
      min_length: 1
      max_length: 20
    items:
      type: object
      fields:
        turn_id:
          type: string
          required: true
          description: "Sequential turn ID (e.g., 'turn_01', 'turn_02')."
          constraints:
            pattern: "turn_\\d{2}"

        speaker:
          type: string
          required: true
          description: "persona_id of who speaks this turn."

        sentences:
          type: list
          required: true
          description: "The sentences within this turn, in order."
          constraints:
            min_length: 1
          items:
            type: object
            fields:
              id:
                type: string
                required: true
                description: "Sentence ID (e.g., 'turn_01.s01', 'turn_01.s02')."
                constraints:
                  pattern: "turn_\\d{2}\\.s\\d{2}"

              text:
                type: string
                required: true
                description: "The sentence text."
